<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RetroBuddy</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --primary:#15803D; --primary-d:#14532D; --secondary:#22C55E; --accent:#0369A1;
      --bg:#F0FDF4; --surface:#FFFFFF; --fg:#14532D; --muted:#ECFDF3; --border:#BBF7D0;
      --grey:#64748B; --radius:14px;
      --shadow:0 1px 3px rgba(20,83,45,.07), 0 8px 24px rgba(20,83,45,.06);
    }
    *{ box-sizing:border-box; }
    body{ font-family:'Noto Sans',system-ui,sans-serif; color:var(--fg); background:var(--bg);
      margin:0; line-height:1.6; }
    h1,h2,h3{ font-family:'Figtree',sans-serif; color:var(--primary-d); line-height:1.25;
      margin:.2rem 0 .6rem; }
    h1{ font-size:1.65rem; } h2{ font-size:1.25rem; } h3{ font-size:1.05rem; margin-top:1.2rem; }
    a{ color:var(--accent); text-decoration:none; }
    a:hover{ text-decoration:underline; }
    p{ margin:.4rem 0 .8rem; }

    /* En-tête avec mascotte */
    .app-header{ display:flex; align-items:center; gap:.75rem; padding:.65rem 1.6rem;
      background:var(--surface); border-bottom:1px solid var(--border); }
    .app-header img{ width:46px; height:46px; }
    .app-header .titre{ font-family:'Figtree',sans-serif; font-weight:700; font-size:1.3rem;
      color:var(--primary-d); }
    .app-header .sous{ color:var(--grey); font-size:.82rem; }

    /* Navigation en pastilles */
    nav.menu{ display:flex; flex-wrap:wrap; gap:.35rem; padding:.55rem 1.6rem;
      background:var(--surface); border-bottom:1px solid var(--border);
      position:sticky; top:0; z-index:10; }
    nav.menu a{ color:var(--primary-d); padding:.4rem .85rem; border-radius:999px;
      font-weight:500; font-size:.92rem; transition:background .15s, color .15s; }
    nav.menu a:hover{ background:var(--muted); text-decoration:none; }
    nav.menu a.sec{ color:var(--grey); font-weight:400; }
    nav.menu a.sec:hover{ color:var(--primary-d); }
    nav.menu .sep{ width:1px; align-self:stretch; background:var(--border); margin:.15rem .35rem; }
    nav.menu a.actif{ background:var(--primary); color:#fff; }

    main{ max-width:1120px; margin:0 auto; padding:1.7rem 1.6rem 3.5rem; }

    /* Tables */
    table{ border-collapse:separate; border-spacing:0; width:100%; background:var(--surface);
      border:1px solid var(--border); border-radius:var(--radius); overflow:hidden;
      margin:1rem 0; font-size:.9rem; }
    th,td{ padding:.55rem .75rem; border-bottom:1px solid var(--border); text-align:left;
      vertical-align:middle; }
    tr:first-child th, thead th{ background:var(--muted); color:var(--primary-d); font-weight:600; }
    tbody tr:hover, table tr:hover{ background:#F7FEF9; }
    table tr:last-child td{ border-bottom:none; }
    td input{ font:inherit; padding:.28rem .4rem; border:1px solid var(--border);
      border-radius:7px; width:6.2rem; background:#fff; }

    /* Boutons */
    button, .btn{ font-family:'Figtree',sans-serif; font-weight:600; font-size:.92rem;
      background:var(--primary); color:#fff; border:none; border-radius:999px;
      padding:.5rem 1.15rem; cursor:pointer; transition:background .15s, transform .05s; }
    button:hover:not(:disabled){ background:#166534; }
    button:active:not(:disabled){ transform:translateY(1px); }
    button:disabled{ opacity:.45; cursor:not-allowed; }
    a button{ width:100%; }
    input:focus-visible, button:focus-visible, a:focus-visible{
      outline:3px solid var(--secondary); outline-offset:2px; }
    input[type=file]{ font:inherit; }

    /* Badges de statut (libellés lisibles + couleur) */
    .badge{ display:inline-block; padding:.16rem .6rem; border-radius:999px; font-size:.8rem;
      font-weight:600; white-space:nowrap; line-height:1.5; }
    .b-ok{ background:#DCFCE7; color:#166534; }
    .b-info{ background:#E2E8F0; color:#475569; }
    .b-warn{ background:#FEF3C7; color:#92400E; }
    .b-danger{ background:#FEE2E2; color:#991B1B; }

    /* Compteur + barre de progression */
    #compteur{ font-family:'Figtree',sans-serif; font-size:1.3rem; font-weight:700;
      color:var(--primary-d); }
    .barre-fond{ background:var(--muted); width:100%; max-width:440px; height:12px;
      border-radius:999px; overflow:hidden; border:1px solid var(--border); }
    .barre-jauge{ background:linear-gradient(90deg,var(--secondary),var(--primary));
      width:0%; height:100%; transition:width .25s ease-out; }

    /* Compat anciennes classes -> couleurs douces */
    .ingeree{ color:#166534; font-weight:600; }
    .ignoree{ color:var(--grey); }
    .en_revue{ color:#B45309; font-weight:600; }
    .erreur{ color:#991B1B; font-weight:700; }

    @media (max-width:640px){
      main{ padding:1.2rem 1rem; }
      .app-header, nav.menu{ padding-left:1rem; padding-right:1rem; }
      .app-header .sous{ display:none; }
    }
    @media (prefers-reduced-motion:reduce){ *{ transition:none !important; } }
  </style>
</head>
<body>
  <header class="app-header">
    <img src="/mascotte.png" alt="Mascotte RetroBuddy : robot et caducée">
    <span class="titre">RetroBuddy</span>
    <span class="sous">- L'outil qui sauve un été 🌴</span>
  </header>
  <nav class="menu">
    <a href="/">Accueil</a>
    <span class="sep" aria-hidden="true"></span>
    <a href="/import-labos">1 · Import labos</a>
    <a href="/retro">2 · Import LGO</a>
    <a href="/resolution">3 · Résolution</a>
    <a href="/factures-retro">4 · Factures rétro</a>
    <span class="sep" aria-hidden="true"></span>
    <a href="/referentiel" class="sec">Référentiel</a>
    <a href="/factures" class="sec">Factures labos</a>
    <a href="/retro-lignes" class="sec">Lignes rétro</a>
    <a href="/reglages" class="sec">⚙ Réglages</a>
  </nav>
  <main>
    {% block contenu %}{% endblock %}
  </main>
  <script>
    (function(){
      var p = location.pathname;
      document.querySelectorAll('nav.menu a').forEach(function(a){
        if (a.getAttribute('href') === p) a.classList.add('actif');
      });
    })();
  </script>
</body>
</html>
